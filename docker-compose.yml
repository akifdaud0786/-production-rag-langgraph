version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_BACKEND=qdrant
      - API_PORT=8080
    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8080"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api

volumes:
  qdrant_data:
